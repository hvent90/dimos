<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DimOS Teleop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // DimOS palette (sourced from dimensionalos.com Framer tokens):
        // bg #181919, deep #151515, fg #fff, accent #b0e1f0 (pale desaturated cyan).
        tailwind.config = {
            theme: { extend: { colors: {
                // Pale cyan accent — same hue across the scale so hover/active
                // stay on-brand instead of veering to a generic Tailwind blue.
                dim: { 50:'#eaf6fb', 100:'#d4ecf5', 400:'#c4e7f3', 500:'#b0e1f0',
                       600:'#8fcfe2', 700:'#6db8cf', 900:'#3d6a7a' },
                // Dark backgrounds matching the site (replaces Tailwind grays).
                bg: { 900:'#181919', 950:'#151515' },
            }}}
        }
    </script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .key-reveal { font-family: 'JetBrains Mono', monospace; word-break: break-all; }
        #canvas { display: none; position: absolute; inset: 0; width: 100%; height: 100%; }
        .kb-key {
            width: 56px; height: 56px;
            display: flex; align-items: center; justify-content: center;
            background: #151515; border: 1px solid #2a2a2a;
            border-radius: 8px; font-family: monospace; font-weight: 600;
            color: #d1d5db;
            user-select: none;
            /* Tappable on touch: no scroll/zoom hijack, no tap-highlight flash. */
            cursor: pointer;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        .kb-key.wide { width: 96px; font-size: 0.85rem; }
        .kb-key.pressed {
            background: #b0e1f0; border-color: #8fcfe2;
            color: #151515;  /* dark text on pale cyan (white is unreadable) */
        }
    </style>
</head>
<body class="bg-bg-900 text-white min-h-screen">
    <div id="app"></div>
    <canvas id="canvas"></canvas>

    <script type="module" src="js/main.js"></script>
</body>
</html>
