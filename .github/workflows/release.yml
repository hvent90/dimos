# DO NOT RENAME — the basename `release.yml` is bound by PyPI/TestPyPI trusted publisher
# configuration. Renaming this file breaks publishing (which is the intended defence: a
# rename by an attacker also disables them).
name: release

on:
  workflow_dispatch:
    inputs:
      dry-run:
        type: boolean
        default: false
        description: >-
          Publish only to TestPyPI.
          This is used to test the workflow itself, do NOT install dimos from TestPyPI.
          TestPyPI is highly vulnerable to supply chain attacks.

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a release in flight

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # For checkout
    outputs:
      version: ${{ steps.read-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Verify dispatched from a release/* branch
        run: |
          branch="${GITHUB_REF#refs/heads/}"
          if [[ "$branch" != release/* ]]; then
            echo "::error::release.yml must be dispatched from a release/* branch (got: $branch)"
            exit 1
          fi
      - name: Read project version
        id: read-version
        run: |
          version=$(uv version --short --frozen)
          if [[ -z "$version" ]]; then
            echo "::error::could not read project version via uv"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $version"
      - name: Verify version not already on PyPI
        run: |
          version="${{ steps.read-version.outputs.version }}"
          http_code=$(curl -sS -o /dev/null -w '%{http_code}' \
            "https://pypi.org/pypi/dimos/${version}/json" 2>/dev/null || true)
          case "$http_code" in
            200) echo "::error::dimos ${version} already exists on PyPI"; exit 1 ;;
            404) echo "ok: ${version} not on PyPI" ;;
            *)   echo "::error::PyPI version check failed (HTTP code: '${http_code}')"; exit 2 ;;
          esac
      - name: Verify tag does not exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.read-version.outputs.version }}" | grep -q .; then
            echo "::error::Tag v${{ steps.read-version.outputs.version }} already exists"
            exit 1
          fi

  compute-ros-pin:
    # Extracts the ros-dev image digest pinned in docker/ros-dev-pin/Dockerfile
    # so the test job can reference it from its `container:` field (which is
    # evaluated at job-setup time and can't read step outputs from its own job).
    # Dependabot bumps the digest in that Dockerfile when :latest moves.
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      digest: ${{ steps.read.outputs.digest }}
    steps:
      - uses: actions/checkout@v5
      - id: read
        run: |
          DIGEST=$(grep -oE 'sha256:[a-f0-9]{64}' docker/ros-dev-pin/Dockerfile)
          if [ -z "$DIGEST" ]; then
            echo "::error::No sha256 digest found in docker/ros-dev-pin/Dockerfile"
            exit 1
          fi
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

  test:
    needs: [validate, compute-ros-pin]
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ALIBABA_API_KEY: ${{ secrets.ALIBABA_API_KEY }}
      # Override skipif_in_ci so the release-tests job actually runs the
      # heavier tests the normal CI matrix opts out of.
      DIMOS_FULL_TEST_RUN: "1"
    timeout-minutes: 300
    runs-on: [self-hosted, Linux, large]
    permissions:
      contents: read  # For checkout
      packages: read  # For pulling the ros-dev container from ghcr.io
    container:
      # Digest pinned via docker/ros-dev-pin/Dockerfile (Dependabot-managed).
      # Mirrored in ci.yml — both workflows use the same digest so any image
      # regression surfaces in CI before it reaches the release run.
      image: ghcr.io/dimensionalos/ros-dev@${{ needs.compute-ros-pin.outputs.digest }}
      # Expose the host's NVIDIA driver and GPU into the container. Needs
      # nvidia-container-toolkit installed on the runner (configured by ops);
      # without it, container start fails with `could not select device driver`.
      options: --gpus all
      env:
        # `--gpus all` enables only `compute` + `utility` capabilities by
        # default. ZED SDK also pulls in libnvcuvid (video decode) and libGL
        # (graphics) at dlopen time. `all` turns on every capability the host
        # driver advertises (compute, utility, video, graphics, display).
        NVIDIA_DRIVER_CAPABILITIES: all
    steps:
      - uses: actions/checkout@v5
        with:
          clean: false
          persist-credentials: false
      - name: Fix permissions
        run: |
          git config --global --add safe.directory '*'
          git clean -ffdx
      - name: Install apt dependencies
        # Workaround until the rebuilt ros-dev image ships libturbojpeg + zstd
        # baked in (see docker/python/Dockerfile).
        run: |
          sudo apt-get update
          sudo apt-get install libturbojpeg zstd -y
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --group tests-self-hosted --frozen
      - name: Install Nix (with Cachix substituter)
        # Sets up Nix pointed at the dimensionalos Cachix cache so the native
        # module fetch below is a substitution, not a from-scratch build. The
        # cache is populated by ci.yml's cmu-nav-natives job on main. Unlike
        # ci.yml, release.yml has no cmu-nav-natives job of its own, so this
        # relies on the cache already being warm from CI (falls back to a
        # local build otherwise). install-nix.sh early-exits if nix is present
        # WITHOUT writing the substituter config, so we (re-)write nix.conf.
        run: |
          export PATH="/nix/var/nix/profiles/default/bin:$PATH"
          bash docker/ros/install-nix.sh
          sudo mkdir -p /etc/nix
          sudo tee /etc/nix/nix.conf > /dev/null <<'EOF'
          experimental-features = nix-command flakes
          extra-substituters = https://dimensionalos.cachix.org
          extra-trusted-public-keys = dimensionalos.cachix.org-1:20ynj6TjpoD3qTxkdNoeHtgs2G2pNvgAq1EQYLTHJXI=
          always-allow-substitutes = true
          build-users-group =
          max-jobs = auto
          EOF
          echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"
      - name: Fetch cmu_nav native modules from Cachix
        # Each cmu_nav module's *_rosbag.py test pre-flights the binary's
        # existence and pytest.skip()s if absent. This discovers every module
        # with a build_command and runs it (a fast Cachix substitution on a
        # warm cache).
        run: uv run bin/build-cmu-nav-natives
      - name: Install ZED SDK
        # Stereolabs proprietary SDK, distributed as a self-extracting .run
        # installer (not on apt/pip). `runtime_only` skips samples/headers/docs;
        # `skip_cuda` assumes libcuda/libcudart are already on the runner —
        # the SDK's .so files dlopen them at process start.
        # `get_python_api.py` is the SDK's installer for the `pyzed` Python
        # bindings against the venv's interpreter, so this step has to run
        # after `Install dependencies` (which provisions the venv).
        # curl: -f errors on HTTP failure, -L follows redirects, --retry
        # smooths transient network issues that would otherwise leave a
        # truncated .run file that fails decompression at extract time.
        run: |
          curl -fL --retry 5 --retry-delay 5 \
            -o /tmp/zed.run \
            https://download.stereolabs.com/zedsdk/5.0/cu12/ubuntu24
          chmod +x /tmp/zed.run
          # `skip_python` stops the SDK installer from auto-installing pyzed
          # for the system Python 3.10 (wasted — can't be reached from the
          # uv venv). We install pyzed for the venv's Python below.
          sudo /tmp/zed.run -- silent runtime_only skip_cuda skip_drivers skip_python
          rm /tmp/zed.run
          # Install pyzed directly into the venv via uv. Avoids
          # `get_python_api.py` which uses `pip install --ignore-installed`
          # and bulldozes the venv's numpy past the version numba can tolerate.
          PY_TAG=$(uv run python -c 'v=__import__("sys").version_info; print(f"cp{v.major}{v.minor}")')
          uv pip install --python .venv/bin/python \
            "https://download.stereolabs.com/zedsdk/5.0/whl/linux_x86_64/pyzed-5.0-${PY_TAG}-${PY_TAG}-linux_x86_64.whl"
          echo "LD_LIBRARY_PATH=/usr/local/zed/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
      - name: Verify ZED SDK Python import
        # The test's compat.py swallows ImportError silently, so a broken
        # pyzed shows up as "ZED SDK not installed" skips with no real cause.
        # This step surfaces the actual error (missing libcudart, missing
        # libsl_zed, ABI mismatch, etc.) instead of letting it hide.
        env:
          LD_LIBRARY_PATH: /usr/local/zed/lib:${{ env.LD_LIBRARY_PATH }}
        run: |
          ldd /usr/local/zed/lib/libsl_zed.so | head -30 || true
          uv run python -c "import pyzed.sl; print('pyzed.sl loaded OK')"
      - name: Build C++ extensions in-place
        run: uv run python setup.py build_ext --inplace
      - name: Source ROS environment
        # The uv venv is sealed (include-system-site-packages = false), so
        # `import rclpy` / `ament_index_python` would fail. Sourcing the ROS
        # setup script and exporting PYTHONPATH/AMENT_PREFIX_PATH/etc into
        # GITHUB_ENV makes them importable from `uv run`.
        shell: bash
        run: |
          source /opt/ros/${ROS_DISTRO}/setup.bash
          {
            echo "PYTHONPATH=$PYTHONPATH"
            echo "AMENT_PREFIX_PATH=$AMENT_PREFIX_PATH"
            echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH"
            echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
            echo "ROS_DISTRO=$ROS_DISTRO"
            echo "ROS_VERSION=$ROS_VERSION"
            echo "ROS_PYTHON_VERSION=$ROS_PYTHON_VERSION"
          } >> "$GITHUB_ENV"
      - name: Pre-warm HuggingFace cache
        # Tests previously skipped via skipif_in_ci pull large model weights
        # from HF at fixture setup time. Pre-fetch here so the cost is paid
        # once and pytest doesn't trip its per-test timeout on the download.
        run: |
          for m in \
            openai/clip-vit-base-patch32 \
            microsoft/Florence-2-base \
            vikhyatk/moondream2 \
          ; do
            uv run huggingface-cli download "$m"
          done
      - name: Run full test suite
        # --error-for-skips ensures a misconfigured runner (missing env var /
        # dep) fails the release rather than silently passing on a smaller
        # subset. The marker excludes only `tool` (dev tooling).
        # --timeout=3600 overrides the 600s baseline in pyproject.toml's
        # addopts: formerly-skipped VLM tests run CPU inference on multi-GB
        # models and need an hour each. (PYTEST_TIMEOUT env var is the
        # lowest-priority knob and is shadowed by the addopts setting.)
        run: uv run pytest -m 'not tool' --error-for-skips --timeout=3600
      - name: Check disk space
        if: failure()
        run: df -h

  build-sdist:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read       # For checkout
      id-token: write      # For attest-build-provenance's OIDC sigstore signing
      attestations: write  # For uploading the SLSA build-provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Build sdist
        run: uv build --sdist
      - name: Attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*.tar.gz'
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x86_64 }
          - { os: ubuntu-24.04-arm, arch: aarch64 }
          - { os: macos-14,         arch: arm64 }
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read       # For checkout
      id-token: write      # For attest-build-provenance's OIDC sigstore signing
      attestations: write  # For uploading the SLSA build-provenance attestation
    env:
      CIBW_ENABLE: "cpython-freethreading"
      CIBW_ARCHS: ${{ matrix.arch }}
      # Skip musllinux (Alpine) — Pinocchio's build ecosystem (pin/coal/cmeel-*)
      # is glibc-only; cmeel-assimp >= 6.0.5 has no musllinux wheels.
      CIBW_SKIP: "*-musllinux_*"
      CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_34  # open3d>=0.19 requires glibc 2.31+
      CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_34  # open3d>=0.19 requires glibc 2.31+
      CIBW_TEST_COMMAND: "python -c 'from dimos.navigation.replanning_a_star.min_cost_astar_ext import min_cost_astar_cpp'"
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
      - name: Attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'wheelhouse/*.whl'
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish-testpypi:
    needs: [validate, test, build-sdist, build-wheels]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/dimos/${{ needs.validate.outputs.version }}/
    permissions:
      id-token: write      # For pypi-publish's OIDC trusted-publisher exchange (TestPyPI)
      attestations: write  # For PEP 740 attestations attached to each uploaded file
    steps:
      - name: Download wheels/sdist
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Install twine
        run: uv tool install twine
      - name: Validate distributions
        run: twine check dist/*
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          attestations: true
          skip-existing: true

  publish-pypi:
    if: ${{ ! inputs.dry-run }}
    needs: [validate, publish-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/dimos/${{ needs.validate.outputs.version }}/
    permissions:
      id-token: write      # For pypi-publish's OIDC trusted-publisher exchange (PyPI)
      attestations: write  # For PEP 740 attestations attached to each uploaded file
    steps:
      - name: Download wheels/sdist
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

  tag-and-release:
    if: ${{ ! inputs.dry-run }}
    needs: [validate, publish-pypi]
    runs-on: ubuntu-latest
    environment: release-tag
    permissions:
      contents: read       # Writes come from the release-bot App token
      attestations: write  # Release-asset attestations
    steps:
      - name: Mint release-bot token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}
      - name: Checkout (pinned to dispatch SHA)
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          # Pin to dispatch SHA so commits pushed to the release branch
          # after dispatch can't shift the tag onto unpublished commits.
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Import GPG signing key into runner-scoped GNUPGHOME
        env:
          GPG_KEY: ${{ secrets.RELEASE_BOT_GPG_PRIVATE_KEY }}
        run: |
          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "$GNUPGHOME" && chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "$GPG_KEY" | gpg --batch --import
          echo "trust-model always" >> "$GNUPGHOME/gpg.conf"
      - name: Configure git identity and signing
        env:
          APP_ID: ${{ vars.RELEASE_BOT_APP_ID }}
          KEY_ID: ${{ vars.RELEASE_BOT_GPG_KEY_ID }}
        run: |
          git config user.name       "dimos-release-bot[bot]"
          git config user.email      "${APP_ID}+dimos-release-bot[bot]@users.noreply.github.com"
          git config user.signingkey "$KEY_ID"
          git config tag.gpgsign     true
          git config commit.gpgsign  true
      - name: Create signed annotated tag and push
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          git tag -s -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
      - name: Download wheels/sdist
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          gh release create "v$VERSION" --verify-tag --notes-from-tag dist/*

  merge-back:
    if: ${{ ! inputs.dry-run }}
    needs: [validate, tag-and-release]
    runs-on: ubuntu-latest
    environment: release-tag
    permissions:
      contents: read  # Writes come from the release-bot App token
    steps:
      - name: Mint release-bot token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_APP_PRIVATE_KEY }}
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          fetch-depth: 0
      - name: Import GPG signing key into runner-scoped GNUPGHOME
        env:
          GPG_KEY: ${{ secrets.RELEASE_BOT_GPG_PRIVATE_KEY }}
        run: |
          export GNUPGHOME="${RUNNER_TEMP}/gnupg"
          mkdir -p "$GNUPGHOME" && chmod 700 "$GNUPGHOME"
          echo "GNUPGHOME=$GNUPGHOME" >> "$GITHUB_ENV"
          echo "$GPG_KEY" | gpg --batch --import
          echo "trust-model always" >> "$GNUPGHOME/gpg.conf"
      - name: Configure git identity and signing
        env:
          APP_ID: ${{ vars.RELEASE_BOT_APP_ID }}
          KEY_ID: ${{ vars.RELEASE_BOT_GPG_KEY_ID }}
        run: |
          git config user.name       "dimos-release-bot[bot]"
          git config user.email      "${APP_ID}+dimos-release-bot[bot]@users.noreply.github.com"
          git config user.signingkey "$KEY_ID"
          git config commit.gpgsign  true
      - name: Push signed merge-back commit to main
        env:
          # Pin to dispatch SHA so commits pushed to the release branch
          # after dispatch can't sneak into main via this merge.
          RELEASE_SHA: ${{ github.sha }}
          RELEASE_BRANCH: ${{ github.ref_name }}
        run: |
          git fetch origin "$RELEASE_SHA"
          # -s ours: take only main's content, preserve two-parent topology so
          # `git log --first-parent main` can reach the release tag via the merge commit.
          git merge --no-ff -s ours --gpg-sign "$RELEASE_SHA" \
            -m "Merge $RELEASE_BRANCH back to main"
          git push origin main
