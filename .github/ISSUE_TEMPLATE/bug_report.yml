name: Bug Report
description: Report a bug in DimOS
type: Bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe what happened and include any details that seem relevant.
      value: |
        ## What happened?

        ## What did you expect?

        ## Steps to reproduce

        ## Environment
        <!-- OS, Python version, DimOS branch/commit, robot/sim/hardware, firmware when relevant -->

        ## Logs / screenshots
    validations:
      required: false
