name: Bug Report
description: Report a bug in DimOS
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and its impact.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands, blueprint names, robot/sim setup, and any relevant inputs.
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, tracebacks, screenshots, or videos.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Python version, DimOS branch/commit, robot/sim/hardware, and firmware when relevant.
      placeholder: |
        OS:
        Python:
        DimOS branch/commit:
        Robot/sim/hardware:
    validations:
      required: true
